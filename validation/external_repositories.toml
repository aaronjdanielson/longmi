# External reference repositories used as validation oracles.
#
# These are never copied into longmi (licensing is unclarified upstream);
# they are pinned external checkouts located via environment variables.

[orr_cannabis]
# Private registry analysis (research-cannabis). Data are never copied into
# longmi; validation/external/orr_gee_replication.py locates the project via
# the environment variable and verifies that longmi's StatsmodelsGEE adapter
# reproduces the manuscript's Table-1 Poisson GEE exactly.
path_environment_variable = "LONGMI_ORR_REPO"
required_files = ["data/ORR_V1V2_MEDS_merged_thru12.xlsx"]
expected_frame = { participants = 3212, observations = 4828, baseline_users = 2304, baseline_nonusers = 908 }

[wijesuriya_tutorial]
# https://github.com/rushwije/Longitudinal_multiple_imputation_tutorial
# R and Stata syntax for "Multiple imputation for longitudinal data:
# A tutorial", plus the simulated CATS dataset (CATS_dataL.csv).
path_environment_variable = "LONGMI_TUTORIAL_REPO"
expected_commit = "f92a32d4a110f3d6c67a9905da732ed073898b9b"
paper_doi = "10.1002/sim.10274"
required_files = [
    "CATS_dataL.csv",
    "Longitudinal_data.R",
    "Simulation_of_data.R",
]
