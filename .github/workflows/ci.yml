name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Test
        # cross-language tests read the committed R reference CSV; the
        # optional R job below regenerates it from mice for drift checks
        run: pytest -q

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  r-parity:
    # regenerates the mice reference and re-runs the parity tests; kept
    # non-blocking until pinned R tooling is set up
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: r-lib/actions/setup-r@v2
      - name: Install mice
        run: Rscript -e 'install.packages("mice", repos="https://cloud.r-project.org")'
      - name: Regenerate reference
        run: Rscript validation/r/rubin_reference.R
      - name: Parity tests
        run: |
          pip install -e ".[dev]"
          pytest tests/cross_language -q
