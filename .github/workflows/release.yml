name: Release

# Tag-triggered release with Trusted Publishing (OIDC, no stored tokens):
# build once (with twine --strict) -> manual approval of the protected
# `pypi` environment -> publish to PyPI. Ordinary CI (ci.yml) never has
# publishing permissions; the pypa/gh-action-pypi-publish step stays
# directly in this top-level workflow.

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=${GITHUB_REF_NAME} version=${VERSION}"
          test "${GITHUB_REF_NAME}" = "v${VERSION}"
      - name: Build sdist and wheel once
        run: |
          pip install build twine
          python -m build
          python -m twine check --strict dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: release-dist
          path: dist/
          retention-days: 14

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi  # protected: requires manual approval
      url: https://pypi.org/p/longmi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: release-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
